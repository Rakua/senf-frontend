<dialog id="resetDialog">
    <div class="normal-gap full-width">
        <div>
            <h1>⚠️ Reset settings ⚠️</h1>
            <p>
                This will reset all settings to their default values and remove all aliases
                and all (you) tokens used to determine which posts are yours.
            </p>

            <p>
                Back up your settings by exporting them before proceeding.
            </p>
        </div>

        <div class="button-bar">
            <button class="okButton dangerous-button">Reset</button>
            <button class="closeButton" autofocus>Cancel</button>
        </div>
    </div>
</dialog>
