<table>
    <tbody>
«loop items»
        <tr id="«val postId»">
            <td class="col-width-id center middle sideways">
                «tpl ./seq_no.html»
            </td>
            <td class="col-width-content-location">
                «tpl ./location.html»
                «if content»
                    <div class="single-line-text">«val content»</div>
                «/if»
                <div>        
                    <div class="float-left">
                        «if keyId»<sfc-keyid value="«val keyId»"></sfc-keyid>«/if»                        
                    </div>
                    
                    <div class="float-right right">
                        <sfc-waiting-time value="«val waitingTimeMin»"></sfc-waiting-time>                        
                    </div>                    
                </div>
            </td>                            
            <td class="col-width-actions2 right">
                «tpl ./button_remove.html»
            </td>
        </tr>
«empty»
        <tr>
            <td class="center">No post has been posted recently</td>            
        </tr>         
«/loop»
    </tbody>
</table>

«tpl ./div_posted_actions.html»
