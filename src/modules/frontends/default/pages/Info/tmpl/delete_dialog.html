<dialog id="deleteDialog">
    <div class="normal-gap full-width">
        <div>
            <h1>⚠️ Delete database ⚠️</h1>
            Your database cannot be restored after deletion!
            Create a backup by exporting it before proceeding.
        </div>

        <div class="button-bar">
            <button class="okButton dangerous-button">Delete</button>
            <button class="closeButton" autofocus>Cancel</button>
        </div>
    </div>
</dialog>
